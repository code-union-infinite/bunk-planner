    <!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bunk Planner Tool</title>

```
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f7fa;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 420px;
        margin: 80px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #45a049;
    }

    .result {
        margin-top: 20px;
        font-weight: bold;
        color: #222;
    }

    a {
        display: inline-block;
        margin-top: 15px;
        text-decoration: none;
        color: #333;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
```

</head>
<body>

```
<div class="container">
    <h1>Bunk Planner</h1>

    <form method="POST">
        <input type="number" name="total" placeholder="Total Classes" required>
        <input type="number" name="attended" placeholder="Classes Attended" required>
        <br>
        <button type="submit">Calculate</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}

    <a href="/">← Back</a>
</div>
```

</body>
</html>

</html>
